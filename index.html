<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Draw">
<title>Draw</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  -webkit-touch-callout: none;
  -webkit-user-select: none;
  user-select: none;
}

html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #1a1a1a;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  touch-action: none;
}

#canvas-container {
  position: fixed;
  inset: 0;
  overflow: hidden;
}

#canvas {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  touch-action: none;
  background: #1a1a1a;
}

/* Eraser cursor */
#eraser-cursor {
  position: fixed;
  border: 2px solid rgba(255, 255, 255, 0.7);
  border-radius: 50%;
  pointer-events: none;
  z-index: 100;
  display: none;
  transform: translate(-50%, -50%);
}

/* Tool switch indicator */
#tool-indicator {
  position: fixed;
  z-index: 300;
  display: flex;
  align-items: center;
  justify-content: center;
  width: 56px;
  height: 56px;
  border-radius: 50%;
  background: rgba(0, 0, 0, 0.75);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  opacity: 0;
  transform: scale(0.5);
  transition: opacity 0.15s ease, transform 0.15s ease;
  pointer-events: none;
}

#tool-indicator.visible {
  opacity: 1;
  transform: scale(1);
}

#tool-indicator svg {
  width: 24px;
  height: 24px;
  stroke: #fff;
  fill: none;
  stroke-width: 2;
  stroke-linecap: round;
  stroke-linejoin: round;
}

/* Floating menu */
#float-menu {
  position: fixed;
  z-index: 200;
  display: flex;
  flex-direction: column;
  gap: 8px;
  padding: 12px;
  background: rgba(255, 255, 255, 0.1);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-radius: 16px;
  border: 1px solid rgba(255, 255, 255, 0.15);
  box-shadow: 0 4px 24px rgba(0,0,0,0.3);
  color: rgba(255, 255, 255, 0.7);
  opacity: 0;
  transform: scale(0.85);
  transition: opacity 0.15s ease, transform 0.15s ease, visibility 0.15s;
  pointer-events: none;
  visibility: hidden;
}

#float-menu.visible {
  opacity: 1;
  transform: scale(1);
  pointer-events: auto;
  visibility: visible;
}

.fm-row {
  display: flex;
  align-items: center;
  gap: 6px;
}

.fm-divider {
  height: 1px;
  background: rgba(255,255,255,0.1);
  margin: 0 -2px;
}

.fm-color {
  width: 26px;
  height: 26px;
  min-width: 26px;
  border-radius: 50%;
  border: 2.5px solid transparent;
  box-shadow: inset 0 0 0 1px rgba(255,255,255,0.15);
  cursor: pointer;
  transition: transform 0.1s;
  padding: 0;
}

.fm-color:active { transform: scale(0.88); }
.fm-color.active { border-color: #007aff; box-shadow: 0 0 0 1.5px rgba(0,122,255,0.4); }

.fm-custom-wrap {
  width: 26px;
  height: 26px;
  min-width: 26px;
  border-radius: 50%;
  overflow: hidden;
  position: relative;
  background: conic-gradient(red, yellow, lime, aqua, blue, magenta, red);
  border: 1.5px solid rgba(255,255,255,0.15);
}

.fm-custom-wrap input {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  opacity: 0;
  cursor: pointer;
  padding: 0;
  border: none;
}

.fm-size {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 36px;
  height: 30px;
  border: none;
  background: transparent;
  border-radius: 7px;
  cursor: pointer;
  transition: background 0.12s;
}

.fm-size.active {
  background: rgba(255,255,255,0.12);
}

.fm-size-dot {
  border-radius: 50%;
  background: rgba(255,255,255,0.85);
}

.fm-sep {
  width: 1px;
  height: 20px;
  background: rgba(255,255,255,0.12);
  margin: 0 2px;
}

.fm-tool {
  display: flex;
  align-items: center;
  gap: 4px;
  height: 30px;
  padding: 0 10px;
  border: none;
  background: transparent;
  border-radius: 7px;
  font-size: 13px;
  font-weight: 500;
  color: rgba(255,255,255,0.7);
  cursor: pointer;
  transition: background 0.12s;
  white-space: nowrap;
}

.fm-tool.active {
  background: rgba(0,122,255,0.2);
  color: #4a9eff;
}

.fm-tool[data-tool="eraser"].active {
  background: rgba(255,59,48,0.2);
  color: #ff6b6b;
}

.fm-tool svg {
  width: 15px;
  height: 15px;
}

.fm-action {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 34px;
  height: 30px;
  border: none;
  background: transparent;
  border-radius: 7px;
  cursor: pointer;
  transition: background 0.12s;
}

.fm-action:active:not(:disabled) { background: rgba(255,255,255,0.12); }
.fm-action:disabled { opacity: 0.25; }
.fm-action svg { width: 16px; height: 16px; }

.fm-clear {
  font-size: 12px;
  font-weight: 500;
  color: #ff6b6b;
  width: auto;
  padding: 0 8px;
}

/* Eraser mode indicator */
#eraser-badge {
  position: fixed;
  top: calc(env(safe-area-inset-top, 8px) + 8px);
  left: 50%;
  transform: translateX(-50%) translateY(-6px);
  z-index: 150;
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 5px 12px;
  background: rgba(255, 59, 48, 0.15);
  border: 1px solid rgba(255, 59, 48, 0.3);
  border-radius: 20px;
  font-size: 12px;
  font-weight: 600;
  color: #ff6b6b;
  opacity: 0;
  transition: opacity 0.2s, transform 0.2s;
  pointer-events: none;
}

#eraser-badge.visible {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

#eraser-badge svg {
  width: 13px;
  height: 13px;
}

/* Size slider popup */
#size-popup {
  position: fixed;
  z-index: 250;
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 14px;
  background: rgba(255, 255, 255, 0.1);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-radius: 12px;
  border: 1px solid rgba(255, 255, 255, 0.15);
  box-shadow: 0 4px 20px rgba(0,0,0,0.3);
  color: rgba(255, 255, 255, 0.7);
  opacity: 0;
  transform: scale(0.9) translateY(4px);
  transition: opacity 0.12s ease, transform 0.12s ease;
  pointer-events: none;
  visibility: hidden;
}

#size-popup.visible {
  opacity: 1;
  transform: scale(1) translateY(0);
  pointer-events: auto;
  visibility: visible;
}

#size-popup input[type="range"] {
  width: 120px;
  height: 24px;
  -webkit-appearance: none;
  appearance: none;
  background: transparent;
}

#size-popup input[type="range"]::-webkit-slider-runnable-track {
  height: 4px;
  border-radius: 2px;
  background: rgba(255,255,255,0.15);
}

#size-popup input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 20px;
  height: 20px;
  border-radius: 50%;
  background: #007aff;
  margin-top: -8px;
}

#size-popup .sp-label {
  font-size: 12px;
  font-weight: 600;
  color: rgba(255,255,255,0.7);
  min-width: 24px;
  text-align: center;
}

/* Confirm dialog */
#confirm-dialog {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 1000;
  background: rgba(0, 0, 0, 0.6);
  align-items: center;
  justify-content: center;
}

#confirm-dialog.visible { display: flex; }

.dialog-box {
  background: #fff;
  border-radius: 14px;
  padding: 24px;
  text-align: center;
  max-width: 280px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.4);
}

.dialog-box h3 { font-size: 17px; margin-bottom: 8px; }
.dialog-box p { font-size: 14px; color: #666; margin-bottom: 20px; }
.dialog-actions { display: flex; gap: 12px; }

.dialog-actions button {
  flex: 1;
  padding: 12px;
  border: none;
  border-radius: 10px;
  font-size: 16px;
  font-weight: 500;
  cursor: pointer;
}

.btn-cancel { background: #f0f0f0; color: #333; }
.btn-confirm { background: #ff3b30; color: #fff; }

/* Canvas action buttons */
#canvas-actions {
  position: fixed;
  top: calc(env(safe-area-inset-top, 8px) + 8px);
  right: calc(env(safe-area-inset-right, 8px) + 8px);
  z-index: 150;
  display: flex;
  gap: 6px;
}

.canvas-btn {
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 5px 10px;
  border: none;
  background: rgba(255, 255, 255, 0.1);
  border: 1px solid rgba(255, 255, 255, 0.15);
  border-radius: 8px;
  font-size: 11px;
  font-weight: 500;
  color: rgba(255, 255, 255, 0.7);
  cursor: pointer;
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  transition: background 0.15s, color 0.15s;
  white-space: nowrap;
  -webkit-touch-callout: none;
  -webkit-user-select: none;
  user-select: none;
}

.canvas-btn:active {
  background: rgba(255, 255, 255, 0.2);
  color: rgba(255, 255, 255, 0.9);
}

.canvas-btn svg {
  width: 12px;
  height: 12px;
  stroke: currentColor;
  fill: none;
  stroke-width: 2;
  stroke-linecap: round;
  stroke-linejoin: round;
}

/* Pages panel */
#pages-panel {
  position: fixed;
  top: calc(env(safe-area-inset-top, 8px) + 40px);
  right: calc(env(safe-area-inset-right, 8px) + 8px);
  z-index: 400;
  width: 260px;
  max-height: 70vh;
  background: rgba(30, 30, 30, 0.96);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid rgba(255, 255, 255, 0.12);
  border-radius: 12px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  display: flex;
  flex-direction: column;
  opacity: 0;
  transform: scale(0.92) translateY(-8px);
  transition: opacity 0.15s ease, transform 0.15s ease, visibility 0.15s;
  pointer-events: none;
  visibility: hidden;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
}

#pages-panel.visible {
  opacity: 1;
  transform: scale(1) translateY(0);
  pointer-events: auto;
  visibility: visible;
}

.pp-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 12px 8px;
  border-bottom: 1px solid rgba(255,255,255,0.08);
}

.pp-title {
  font-size: 13px;
  font-weight: 600;
  color: rgba(255,255,255,0.85);
}

.pp-close {
  width: 22px;
  height: 22px;
  border: none;
  background: none;
  color: rgba(255,255,255,0.4);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 4px;
  padding: 0;
}

.pp-close:active { background: rgba(255,255,255,0.1); }
.pp-close svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2; }

.pp-tree {
  flex: 1;
  overflow-y: auto;
  padding: 6px 0;
  -webkit-overflow-scrolling: touch;
}

.pp-item {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 12px;
  cursor: pointer;
  transition: background 0.1s;
  font-size: 12px;
  color: rgba(255,255,255,0.7);
  min-height: 30px;
}

.pp-item:active { background: rgba(255,255,255,0.06); }
.pp-item.active { background: rgba(74, 158, 255, 0.15); color: #4a9eff; }

.pp-item svg {
  width: 14px;
  height: 14px;
  min-width: 14px;
  stroke: currentColor;
  fill: none;
  stroke-width: 1.8;
  stroke-linecap: round;
  stroke-linejoin: round;
}

.pp-item-name {
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.pp-item-name[contenteditable] {
  outline: none;
  background: rgba(255,255,255,0.1);
  border-radius: 3px;
  padding: 1px 4px;
  margin: -1px -4px;
}

.pp-indent-1 { padding-left: 28px; }
.pp-indent-2 { padding-left: 44px; }
.pp-indent-3 { padding-left: 60px; }

.pp-folder-arrow {
  width: 12px;
  min-width: 12px;
  height: 12px;
  transition: transform 0.15s;
  opacity: 0.5;
}

.pp-folder-arrow.open { transform: rotate(90deg); }

.pp-item-actions {
  display: flex;
  gap: 2px;
  opacity: 0;
  transition: opacity 0.1s;
}

.pp-item:hover .pp-item-actions,
.pp-item:active .pp-item-actions { opacity: 1; }

.pp-action-btn {
  width: 20px;
  height: 20px;
  border: none;
  background: none;
  color: rgba(255,255,255,0.4);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 3px;
  padding: 0;
}

.pp-action-btn:active { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.7); }
.pp-action-btn svg { width: 11px; height: 11px; stroke: currentColor; fill: none; stroke-width: 2; }

.pp-footer {
  border-top: 1px solid rgba(255,255,255,0.08);
  padding: 8px;
  display: flex;
  gap: 6px;
}

.pp-footer-btn {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 4px;
  padding: 6px 0;
  border: none;
  background: rgba(255,255,255,0.06);
  border-radius: 6px;
  font-size: 11px;
  font-weight: 500;
  color: rgba(255,255,255,0.6);
  cursor: pointer;
  transition: background 0.1s;
}

.pp-footer-btn:active { background: rgba(255,255,255,0.12); color: rgba(255,255,255,0.85); }
.pp-footer-btn svg { width: 12px; height: 12px; stroke: currentColor; fill: none; stroke-width: 2; }

.pp-empty {
  padding: 20px 12px;
  text-align: center;
  font-size: 11px;
  color: rgba(255,255,255,0.3);
}

/* Toast notification */
#toast {
  position: fixed;
  bottom: calc(env(safe-area-inset-bottom, 8px) + 20px);
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  z-index: 500;
  padding: 8px 16px;
  background: rgba(255, 255, 255, 0.9);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  border-radius: 10px;
  font-size: 13px;
  font-weight: 500;
  color: #333;
  opacity: 0;
  transition: opacity 0.2s, transform 0.2s;
  pointer-events: none;
}

#toast.visible {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* Sync indicator */
#sync-indicator {
  position: fixed;
  top: calc(env(safe-area-inset-top, 8px) + 8px);
  left: calc(env(safe-area-inset-left, 8px) + 8px);
  z-index: 150;
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 4px 8px;
  border-radius: 6px;
  font-size: 10px;
  font-weight: 500;
  color: rgba(255, 255, 255, 0.4);
  opacity: 0;
  transition: opacity 0.3s;
  pointer-events: none;
}

#sync-indicator.visible { opacity: 1; }
#sync-indicator.saving { color: rgba(255, 170, 51, 0.7); }
#sync-indicator.offline { color: rgba(255, 59, 48, 0.7); }

#sync-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: currentColor;
}

/* Edge glow */
.edge-glow {
  position: fixed;
  z-index: 50;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.25s ease;
}
#edge-glow-top { top: 0; left: 0; right: 0; height: 35px; background: radial-gradient(ellipse at 50% 0%, rgba(120, 255, 170, 0.3), transparent 70%); }
#edge-glow-bottom { bottom: 0; left: 0; right: 0; height: 35px; background: radial-gradient(ellipse at 50% 100%, rgba(120, 255, 170, 0.3), transparent 70%); }
#edge-glow-left { top: 0; bottom: 0; left: 0; width: 35px; background: radial-gradient(ellipse at 0% 50%, rgba(120, 255, 170, 0.3), transparent 70%); }
#edge-glow-right { top: 0; bottom: 0; right: 0; width: 35px; background: radial-gradient(ellipse at 100% 50%, rgba(120, 255, 170, 0.3), transparent 70%); }
.edge-glow.pulse { animation: edgePulse 0.6s ease-in-out; }
@keyframes edgePulse { 0%,100% { opacity: inherit; } 50% { opacity: 0.8; } }

/* Pressure sensitivity slider */
.fm-pressure {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 0 4px;
}
.fm-pressure-label {
  font-size: 9px;
  opacity: 0.5;
  min-width: 14px;
  text-align: center;
}
.fm-pressure input[type="range"] {
  flex: 1;
  height: 20px;
  -webkit-appearance: none;
  appearance: none;
  background: transparent;
}
.fm-pressure input[type="range"]::-webkit-slider-runnable-track {
  height: 3px;
  border-radius: 1.5px;
  background: rgba(255,255,255,0.15);
}
.fm-pressure input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: #4a9eff;
  margin-top: -5.5px;
}

/* Color row wrapping */
.fm-colors {
  display: flex;
  align-items: center;
  gap: 6px;
  flex-wrap: wrap;
}

/* Selection context menu */
#sel-ctx-menu {
  position: fixed;
  z-index: 210;
  display: flex;
  gap: 4px;
  padding: 6px 8px;
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 10px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.3);
  pointer-events: none;
  opacity: 0;
  transform: scale(0.85);
  transition: opacity 0.12s, transform 0.12s;
  visibility: hidden;
}
#sel-ctx-menu.visible {
  opacity: 1;
  transform: scale(1);
  pointer-events: auto;
  visibility: visible;
}
.sel-ctx-btn {
  display: flex;
  align-items: center;
  gap: 3px;
  padding: 5px 10px;
  border: none;
  background: transparent;
  border-radius: 6px;
  font-size: 11px;
  font-weight: 500;
  color: rgba(255,255,255,0.7);
  cursor: pointer;
  white-space: nowrap;
}
.sel-ctx-btn:active { background: rgba(255,255,255,0.12); }
.sel-ctx-btn.destructive { color: #ff6b6b; }
.sel-ctx-btn svg { width: 12px; height: 12px; stroke: currentColor; fill: none; stroke-width: 2; }
</style>
</head>
<body>

<div id="float-menu">
  <div class="fm-row fm-colors" id="color-row">
    <button class="fm-color active" data-color="#ffffff" style="background:#ffffff"></button>
    <button class="fm-color" data-color="#4a9eff" style="background:#4a9eff"></button>
    <button class="fm-color" data-color="#ff4d4d" style="background:#ff4d4d"></button>
    <button class="fm-color" data-color="#4ddb4d" style="background:#4ddb4d"></button>
    <button class="fm-color" data-color="#ffaa33" style="background:#ffaa33"></button>
    <button class="fm-color" data-color="#b366e0" style="background:#b366e0"></button>
    <div class="fm-custom-wrap">
      <input type="color" id="custom-color" value="#ff00aa">
    </div>
  </div>
  <div class="fm-divider"></div>
  <div class="fm-row">
    <button class="fm-size active" data-size="thin"><span class="fm-size-dot" style="width:4px;height:4px"></span></button>
    <button class="fm-size" data-size="medium"><span class="fm-size-dot" style="width:7px;height:7px"></span></button>
    <button class="fm-size" data-size="thick"><span class="fm-size-dot" style="width:12px;height:12px"></span></button>
    <span class="fm-sep"></span>
    <button class="fm-tool active" data-tool="pen">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19l7-7 3 3-7 7-3-3z"/><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/></svg>
      Pen
    </button>
    <button class="fm-tool" data-tool="dotted">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="2 4"><line x1="3" y1="12" x2="21" y2="12"/></svg>
      Dotted
    </button>
    <button class="fm-tool" data-tool="eraser">
