<script>
// ── Firebase config — replace with your project's values ──
var firebaseConfig = {
  apiKey: "AIzaSyDZxDvhTodhJRiTOGD3wtNG7BbmbXnNPNI",
  authDomain: "nolus-a545d.firebaseapp.com",
  databaseURL: "https://nolus-a545d-default-rtdb.firebaseio.com",
  projectId: "nolus-a545d",
  storageBucket: "nolus-a545d.firebasestorage.app",
  messagingSenderId: "204895820922",
  appId: "1:204895820922:web:60736d641ff440629befc3"
};

firebase.initializeApp(firebaseConfig);
var db = firebase.database();
firebase.auth().signInAnonymously().catch(function(err) {
  console.warn('Firebase auth failed:', err);
});

// ── Canvas ID routing ──
function getCanvasId() {
  var params = new URLSearchParams(window.location.search);
  return params.get('id');
}

function generateId() {
  var chars = 'abcdefghijklmnopqrstuvwxyz0123456789';
  var id = '';
  for (var i = 0; i < 8; i++) id += chars[Math.floor(Math.random() * chars.length)];
  return id;
}

var canvasId = getCanvasId();
if (!canvasId) {
  canvasId = generateId();
  var url = window.location.pathname + '?id=' + canvasId;
  window.history.replaceState(null, '', url);
}

(function() {
  'use strict';

  var canvas = document.getElementById('canvas');
  var ctx = canvas.getContext('2d', { desynchronized: true });
  var floatMenu = document.getElementById('float-menu');
  var eraserBadge = document.getElementById('eraser-badge');
  var eraserCursor = document.getElementById('eraser-cursor');
  var toolIndicator = document.getElementById('tool-indicator');
  var toolIndicatorIcon = document.getElementById('tool-indicator-icon');
  var sizePopup = document.getElementById('size-popup');
  var sizeSlider = document.getElementById('size-slider');
  var sizeLabel = document.getElementById('size-label');
  var dialog = document.getElementById('confirm-dialog');

  // Offscreen canvas for stroke compositing (eraser uses destination-out)
  var drawLayer = document.createElement('canvas');
  var drawCtx = drawLayer.getContext('2d');

  // ── State ──
  var currentTool = 'pen';
  var currentColor = '#ffffff';
  var strokes = [];
  var redoStack = [];
  var currentStroke = null;
  var isDrawing = false;
  var menuVisible = false;

  // Size presets (persisted to localStorage)
  var sizePresets = loadSizePresets();
  var currentSizeKey = 'thin';
  var eraserSize = loadEraserSize();

  function loadSizePresets() {
    try {
      var saved = JSON.parse(localStorage.getItem('drawapp_sizes'));
      if (saved && saved.thin && saved.medium && saved.thick) return saved;
    } catch(e) {}
    return { thin: 2, medium: 4, thick: 7 };
  }

  function saveSizePresets() {
    localStorage.setItem('drawapp_sizes', JSON.stringify(sizePresets));
  }

  function loadEraserSize() {
    try {
      var s = parseInt(localStorage.getItem('drawapp_eraser_size'));
      if (s > 0) return s;
    } catch(e) {}
    return 20;
  }

  function saveEraserSize() {
    localStorage.setItem('drawapp_eraser_size', String(eraserSize));
  }

  function loadPressureSensitivity() {
    try {
      var s = parseFloat(localStorage.getItem('drawapp_pressure'));
      if (s >= 0 && s <= 1) return s;
    } catch(e) {}
    return 0.5;
  }

  function savePressureSensitivity() {
    localStorage.setItem('drawapp_pressure', String(pressureSensitivity));
  }

  function loadCustomColors() {
    try {
      var c = JSON.parse(localStorage.getItem('drawapp_custom_colors'));
      if (Array.isArray(c)) return c.slice(0, 12);
    } catch(e) {}
    return [];
  }

  function saveCustomColors() {
    localStorage.setItem('drawapp_custom_colors', JSON.stringify(customColors));
  }

  function sliderToSize(sliderVal, isEraser) {
    var minS = isEraser ? 5 : 1;
    var maxS = 120;
    return Math.max(minS, Math.round(minS * Math.pow(maxS / minS, sliderVal / 100)));
  }

  function sizeToSlider(size, isEraser) {
    var minS = isEraser ? 5 : 1;
    var maxS = 120;
    if (size <= minS) return 0;
    return Math.min(100, Math.round(100 * Math.log(size / minS) / Math.log(maxS / minS)));
  }

  // Fixed canvas dimensions (world units)
  var CANVAS_W = 4000;
  var CANVAS_H = 3000;
  var GRID_SPACING = 24;

  // Viewport
  var view = { x: 0, y: 0, scale: 1 };

  // Gesture state
  var pinchState = null;
  var twoFingerStart = null;
  var dragState = null;

  // Double-tap detection
  var lastTap = { time: 0, x: 0, y: 0 };

  // Long-press state for size buttons
  var longPressTimer = null;
  var longPressTarget = null;
  var sizePopupVisible = false;
  var sizePopupKey = null;

  // Track pen position
  var lastPenX = 0;
  var lastPenY = 0;

  // Shape snapping state
  var holdTimer = null;
  var holdScreenAnchor = null;
  var snapAnimating = false;
  var penIsDown = false;
  var snapDragActive = false;
  var snapDragShapeIdx = -1;

  // Edge glow state
  var edgeGlowEls = null;
  var isPanning = false;
  var edgeGlowActive = {top: false, right: false, bottom: false, left: false};

  // Momentum scrolling state
  var momentumVel = {x: 0, y: 0};
  var momentumAnimId = null;
  var panHistory = [];

  // Pressure sensitivity (0 = none, 1 = max)
  var pressureSensitivity = loadPressureSensitivity();

  // Custom colors
  var customColors = loadCustomColors();

  // Batch save state
  var batchPending = [];
  var batchTimer = null;
  var BATCH_SIZE = 10;
  var BATCH_INTERVAL = 60000;

  // Selection tool state
  var selectedIndices = [];
  var selectionMode = 'idle';
  var lassoPoints = [];
  var selDragStart = null;
  var selOrigPositions = null;
  var selCtxMenu = null;

  var dpr = window.devicePixelRatio || 1;

  // ── Toast ──
  var toastEl = document.getElementById('toast');
  var toastTimer = null;
  function showToast(msg) {
    clearTimeout(toastTimer);
    toastEl.textContent = msg;
    toastEl.classList.add('visible');
    toastTimer = setTimeout(function() { toastEl.classList.remove('visible'); }, 2000);
  }

  // ── Sync indicator ──
  var syncIndicator = document.getElementById('sync-indicator');
  var syncText = document.getElementById('sync-text');
  var syncTimer = null;
  function showSync(state, msg) {
    clearTimeout(syncTimer);
    syncIndicator.className = 'visible ' + state;
    syncText.textContent = msg;
    if (state !== 'offline') {
      syncTimer = setTimeout(function() { syncIndicator.classList.remove('visible'); }, 2000);
    }
  }

  // ── Cloud sync (Firebase) ──
  var canvasRef = db.ref('canvases/' + canvasId + '/strokes');
  var isLoadingFromCloud = false;
  var localBufferKey = 'nolus_pending_' + canvasId;

  function strokeToJSON(s) {
    var data = {
      tool: s.tool,
      color: s.color || null,
      baseSize: s.baseSize,
      timestamp: Date.now()
    };
    if (s.pressureSens !== undefined) data.pressureSens = s.pressureSens;
    if (s.tool === 'shape') {
      data.shapeType = s.shapeType;
      data.bounds = s.bounds;
      if (s.p1) data.p1 = s.p1;
      if (s.p2) data.p2 = s.p2;
    } else {
      data.points = s.points;
    }
    return data;
  }

  function saveStrokeToCloud(stroke) {
    var data = strokeToJSON(stroke);
    if (!navigator.onLine) {
      bufferOffline(data);
      showSync('offline', 'Offline');
      return;
    }
    showSync('saving', 'Saving…');
    canvasRef.push(data, function(err) {
      if (err) {
        bufferOffline(data);
        showSync('offline', 'Save failed');
      } else {
        showSync('', 'Saved');
      }
    });
  }

  function saveAllStrokesToCloud() {
    if (!navigator.onLine) return;
    showSync('saving', 'Saving…');
    var data = {};
    for (var i = 0; i < strokes.length; i++) {
      data[canvasRef.push().key] = strokeToJSON(strokes[i]);
    }
    canvasRef.set(data, function(err) {
      if (err) showSync('offline', 'Save failed');
      else showSync('', 'Saved');
    });
  }

  function loadFromCloud(callback) {
    isLoadingFromCloud = true;
    showSync('saving', 'Loading…');
    canvasRef.once('value', function(snapshot) {
      var val = snapshot.val();
      if (val) {
        strokes = [];
        redoStack = [];
        var keys = Object.keys(val).sort(function(a, b) {
          return (val[a].timestamp || 0) - (val[b].timestamp || 0);
        });
        for (var i = 0; i < keys.length; i++) {
          var s = val[keys[i]];
          if (s.tool === 'shape') {
            strokes.push({
              tool: 'shape',
              shapeType: s.shapeType,
              color: s.color || '#ffffff',
              baseSize: s.baseSize,
              pressureSens: s.pressureSens !== undefined ? s.pressureSens : 0.5,
              bounds: s.bounds,
              p1: s.p1 || null,
              p2: s.p2 || null
            });
          } else {
            strokes.push({
              tool: s.tool,
              color: s.color || '#ffffff',
              baseSize: s.baseSize,
              pressureSens: s.pressureSens !== undefined ? s.pressureSens : 0.5,
              points: s.points
            });
          }
        }
      }
      isLoadingFromCloud = false;
      showSync('', 'Loaded');
      if (callback) callback();
    }, function(err) {
      isLoadingFromCloud = false;
      showSync('offline', 'Load failed');
      if (callback) callback();
    });
  }

  // ── Offline buffer ──
  function bufferOffline(data) {
    try {
      var buf = JSON.parse(localStorage.getItem(localBufferKey) || '[]');
      buf.push(data);
      localStorage.setItem(localBufferKey, JSON.stringify(buf));
    } catch(e) {}
  }

  function flushOfflineBuffer() {
    try {
      var buf = JSON.parse(localStorage.getItem(localBufferKey) || '[]');
      if (buf.length === 0) return;
      showSync('saving', 'Syncing ' + buf.length + '…');
      var updates = {};
      for (var i = 0; i < buf.length; i++) {
        updates[canvasRef.push().key] = buf[i];
      }
      canvasRef.update(updates, function(err) {
        if (!err) {
          localStorage.removeItem(localBufferKey);
          showSync('', 'Synced');
        }
      });
    } catch(e) {}
  }

  window.addEventListener('online', function() {
    flushOfflineBuffer();
  });

  // ── Batch save system ──

  function queueSave() {
    saveStrokesToLocalStorage();
    batchPending.push(1);
    if (batchPending.length >= BATCH_SIZE) {
      flushBatch();
    } else if (!batchTimer) {
      batchTimer = setTimeout(flushBatch, BATCH_INTERVAL);
    }
  }

  function flushBatch() {
    if (batchTimer) { clearTimeout(batchTimer); batchTimer = null; }
    if (batchPending.length === 0) return;
    batchPending = [];
    saveAllStrokesToCloud();
  }

  function saveStrokesToLocalStorage() {
    try {
      localStorage.setItem('nolus_strokes_' + canvasId, JSON.stringify(strokes.map(strokeToJSON)));
    } catch(e) {}
  }

  window.addEventListener('beforeunload', function() {
    if (batchPending.length > 0) flushBatch();
  });

  // ── Copy Link ──
  document.getElementById('copy-link-btn').addEventListener('click', function(e) {
    e.preventDefault();
    var url = window.location.origin + window.location.pathname + '?id=' + canvasId;
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(url).then(function() {
        showToast('Link copied!');
      }).catch(function() {
        fallbackCopy(url);
      });
    } else {
      fallbackCopy(url);
    }
  });

  function fallbackCopy(text) {
    var ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand('copy'); showToast('Link copied!'); }
    catch(e) { showToast('Copy failed'); }
    document.body.removeChild(ta);
  }

  // ── Pages browser ──
  var pagesPanel = document.getElementById('pages-panel');
  var ppTree = document.getElementById('pp-tree');
  var pagesPanelVisible = false;
  var metaRef = db.ref('meta');
  var expandedFolders = {};
  try {
    var ef = JSON.parse(localStorage.getItem('nolus_expanded_folders') || '{}');
    if (ef && typeof ef === 'object') expandedFolders = ef;
  } catch(e) {}

  function saveExpandedFolders() {
    localStorage.setItem('nolus_expanded_folders', JSON.stringify(expandedFolders));
  }

  function ensureCurrentPageRegistered(allItems, callback) {
    var found = false;
    for (var k in allItems) {
      if (allItems[k].type === 'page' && allItems[k].canvasId === canvasId) {
        found = true;
        break;
      }
    }
    if (!found) {
      var newKey = metaRef.push().key;
      var entry = { type: 'page', name: 'Untitled', canvasId: canvasId, parent: null, createdAt: Date.now() };
      metaRef.child(newKey).set(entry, function() { if (callback) callback(); });
    } else {
      if (callback) callback();
    }
  }

  function togglePagesPanel() {
    if (pagesPanelVisible) {
      pagesPanel.classList.remove('visible');
      pagesPanelVisible = false;
    } else {
      pagesPanel.classList.add('visible');
      pagesPanelVisible = true;
      loadPagesTree();
    }
  }

  function loadPagesTree() {
    ppTree.innerHTML = '<div class="pp-empty">Laden…</div>';
    metaRef.once('value', function(snapshot) {
      var items = snapshot.val() || {};
      ensureCurrentPageRegistered(items, function() {
        metaRef.once('value', function(snap2) {
          renderTree(snap2.val() || {});
        });
      });
    });
  }

  function renderTree(items) {
    var folders = [];
    var pages = [];
    for (var key in items) {
      var it = items[key];
      it._key = key;
      if (it.type === 'folder') folders.push(it);
      else pages.push(it);
    }
    folders.sort(function(a, b) { return (a.name || '').localeCompare(b.name || ''); });
    pages.sort(function(a, b) { return (a.createdAt || 0) - (b.createdAt || 0); });

    var html = '';

    function renderFolder(folder, depth) {
      var isOpen = expandedFolders[folder._key];
      html += '<div class="pp-item pp-indent-' + depth + '" data-key="' + folder._key + '" data-type="folder">'
        + '<svg class="pp-folder-arrow' + (isOpen ? ' open' : '') + '" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>'
        + '<svg viewBox="0 0 24 24"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg>'
        + '<span class="pp-item-name">' + escHtml(folder.name || 'Ordner') + '</span>'
        + '<span class="pp-item-actions">'
        + '<button class="pp-action-btn pp-add-page" title="Neue Seite hier"><svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></button>'
        + '<button class="pp-action-btn pp-add-subfolder" title="Unterordner"><svg viewBox="0 0 24 24"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/><line x1="12" y1="11" x2="12" y2="17"/><line x1="9" y1="14" x2="15" y2="14"/></svg></button>'
        + '<button class="pp-action-btn pp-rename" title="Umbenennen"><svg viewBox="0 0 24 24"><path d="M17 3a2.83 2.83 0 114 4L7.5 20.5 2 22l1.5-5.5L17 3z"/></svg></button>'
        + '<button class="pp-action-btn pp-delete" title="Löschen"><svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/></svg></button>'
        + '</span></div>';
      if (isOpen) {
        var children = folders.filter(function(f) { return f.parent === folder._key; });
        var childPages = pages.filter(function(p) { return p.parent === folder._key; });
        children.forEach(function(c) { renderFolder(c, Math.min(depth + 1, 3)); });
        childPages.forEach(function(p) { renderPage(p, Math.min(depth + 1, 3)); });
      }
    }

    function renderPage(page, depth) {
      var isCurrent = page.canvasId === canvasId;
      html += '<div class="pp-item pp-indent-' + depth + (isCurrent ? ' active' : '') + '" data-key="' + page._key + '" data-type="page" data-canvas="' + page.canvasId + '">'
        + '<svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>'
        + '<span class="pp-item-name">' + escHtml(page.name || 'Untitled') + '</span>'
        + '<span class="pp-item-actions">'
        + '<button class="pp-action-btn pp-rename" title="Umbenennen"><svg viewBox="0 0 24 24"><path d="M17 3a2.83 2.83 0 114 4L7.5 20.5 2 22l1.5-5.5L17 3z"/></svg></button>'
        + '<button class="pp-action-btn pp-delete" title="Löschen"><svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/></svg></button>'
        + '</span></div>';
    }

    var rootFolders = folders.filter(function(f) { return !f.parent; });
    var rootPages = pages.filter(function(p) { return !p.parent; });

    rootFolders.forEach(function(f) { renderFolder(f, 0); });
    rootPages.forEach(function(p) { renderPage(p, 0); });

    if (!rootFolders.length && !rootPages.length) {
      html = '<div class="pp-empty">Keine Seiten</div>';
    }

    ppTree.innerHTML = html;

    ppTree.querySelectorAll('.pp-item').forEach(function(el) {
      el.addEventListener('click', function(e) {
        if (e.target.closest('.pp-action-btn')) return;
        var key = el.dataset.key;
        var type = el.dataset.type;
        if (type === 'folder') {
          expandedFolders[key] = !expandedFolders[key];
          saveExpandedFolders();
          loadPagesTree();
        } else if (type === 'page') {
          var cid = el.dataset.canvas;
          if (cid && cid !== canvasId) {
            window.location.href = window.location.pathname + '?id=' + cid;
          }
        }
      });

      el.querySelectorAll('.pp-rename').forEach(function(btn) {
        btn.addEventListener('click', function(e) {
          e.stopPropagation();
          var nameSpan = el.querySelector('.pp-item-name');
          nameSpan.contentEditable = 'true';
          nameSpan.focus();
          var range = document.createRange();
          range.selectNodeContents(nameSpan);
          var sel = window.getSelection();
          sel.removeAllRanges();
          sel.addRange(range);

          function finishRename() {
            nameSpan.contentEditable = 'false';
            var newName = nameSpan.textContent.trim();
            if (newName) {
              metaRef.child(el.dataset.key).update({ name: newName });
            }
            nameSpan.removeEventListener('blur', finishRename);
            nameSpan.removeEventListener('keydown', onKey);
          }
          function onKey(ev) {
            if (ev.key === 'Enter') { ev.preventDefault(); nameSpan.blur(); }
            if (ev.key === 'Escape') { nameSpan.contentEditable = 'false'; loadPagesTree(); }
          }
          nameSpan.addEventListener('blur', finishRename);
          nameSpan.addEventListener('keydown', onKey);
        });
      });

      el.querySelectorAll('.pp-delete').forEach(function(btn) {
        btn.addEventListener('click', function(e) {
          e.stopPropagation();
          var key = el.dataset.key;
          var type = el.dataset.type;
          if (type === 'page' && el.dataset.canvas === canvasId) {
            showToast('Aktive Seite kann nicht gelöscht werden');
            return;
          }
          metaRef.child(key).remove(function() { loadPagesTree(); });
        });
      });

      el.querySelectorAll('.pp-add-page').forEach(function(btn) {
        btn.addEventListener('click', function(e) {
          e.stopPropagation();
          var folderKey = el.dataset.key;
          var newId = generateId();
          var entry = { type: 'page', name: 'Untitled', canvasId: newId, parent: folderKey, createdAt: Date.now() };
          expandedFolders[folderKey] = true;
          saveExpandedFolders();
          metaRef.push(entry, function() {
            window.location.href = window.location.pathname + '?id=' + newId;
          });
        });
      });

      el.querySelectorAll('.pp-add-subfolder').forEach(function(btn) {
        btn.addEventListener('click', function(e) {
          e.stopPropagation();
          var parentKey = el.dataset.key;
          var entry = { type: 'folder', name: 'Neuer Ordner', parent: parentKey, createdAt: Date.now() };
          expandedFolders[parentKey] = true;
          var ref = metaRef.push(entry, function() {
            expandedFolders[ref.key] = true;
            saveExpandedFolders();
            loadPagesTree();
          });
        });
      });
    });
  }

  function escHtml(s) {
    return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  document.getElementById('pages-btn').addEventListener('click', function(e) {
    e.preventDefault();
    togglePagesPanel();
  });

  document.getElementById('pp-close').addEventListener('click', function(e) {
    e.preventDefault();
    pagesPanel.classList.remove('visible');
    pagesPanelVisible = false;
  });

  document.getElementById('pp-new-page').addEventListener('click', function(e) {
    e.preventDefault();
    var newId = generateId();
    var entry = { type: 'page', name: 'Untitled', canvasId: newId, parent: null, createdAt: Date.now() };
    metaRef.push(entry, function() {
      window.location.href = window.location.pathname + '?id=' + newId;
    });
  });

  document.getElementById('pp-new-folder').addEventListener('click', function(e) {
    e.preventDefault();
    var entry = { type: 'folder', name: 'Neuer Ordner', parent: null, createdAt: Date.now() };
    var ref = metaRef.push(entry, function() {
      expandedFolders[ref.key] = true;
      saveExpandedFolders();
      loadPagesTree();
    });
  });

  // Prevent panel touches from panning
  ['touchstart', 'touchmove', 'touchend', 'pointerdown'].forEach(function(evt) {
    document.getElementById('canvas-actions').addEventListener(evt, function(e) { e.stopPropagation(); });
    pagesPanel.addEventListener(evt, function(e) { e.stopPropagation(); });
  });

  // Close pages panel on outside tap
  document.addEventListener('pointerdown', function(e) {
    if (pagesPanelVisible && !pagesPanel.contains(e.target) && !document.getElementById('pages-btn').contains(e.target)) {
      pagesPanel.classList.remove('visible');
      pagesPanelVisible = false;
    }
  });

  // ── Canvas setup ──

  function resizeCanvas() {
    canvas.width = window.innerWidth * dpr;
    canvas.height = window.innerHeight * dpr;
    drawLayer.width = canvas.width;
    drawLayer.height = canvas.height;
    redrawAll();
  }

  function setWorldTransform(target) {
    var c = target || ctx;
    c.setTransform(
      view.scale * dpr, 0,
      0, view.scale * dpr,
      -view.x * view.scale * dpr,
      -view.y * view.scale * dpr
    );
  }

  function drawBackground() {
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.fillStyle = '#1a1a1a';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
  }

  function drawGrid() {
    var visLeft = view.x;
    var visTop = view.y;
    var visRight = view.x + window.innerWidth / view.scale;
    var visBottom = view.y + window.innerHeight / view.scale;

    var screenSpacing = GRID_SPACING * view.scale;
    var mult = 1;
    while (screenSpacing * mult < 10) mult *= 2;
    var spacing = GRID_SPACING * mult;

    var startX = Math.max(0, Math.floor(visLeft / spacing) * spacing);
    var startY = Math.max(0, Math.floor(visTop / spacing) * spacing);
    var endX = Math.min(CANVAS_W, visRight + spacing);
    var endY = Math.min(CANVAS_H, visBottom + spacing);

    ctx.fillStyle = 'rgba(255, 255, 255, 0.08)';
    for (var x = startX; x <= endX; x += spacing) {
      for (var y = startY; y <= endY; y += spacing) {
        ctx.beginPath();
        ctx.arc(x, y, 0.8, 0, 6.2832);
        ctx.fill();
      }
    }
  }

  function redrawAll() {
    drawBackground();
    setWorldTransform();
    drawGrid();

    // Render strokes to offscreen layer
    drawCtx.setTransform(1, 0, 0, 1, 0, 0);
    drawCtx.clearRect(0, 0, drawLayer.width, drawLayer.height);
    setWorldTransform(drawCtx);

    for (var i = 0; i < strokes.length; i++) {
      renderStroke(drawCtx, strokes[i]);
    }

    // Composite stroke layer onto display
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.drawImage(drawLayer, 0, 0);

    // Draw selection overlay
    if (selectedIndices.length > 0 && currentTool === 'select') {
      drawSelectionOverlay();
    }
  }

  // ── Stroke rendering ──

  function renderStroke(c, stroke) {
    if (stroke.tool === 'shape') {
      renderShapeStroke(c, stroke);
      return;
    }
    if (stroke.tool === 'eraser') {
      renderEraserStroke(c, stroke);
      return;
    }

    if (stroke.points.length < 2) return;
    var pts = stroke.points;
    c.lineCap = 'round';
    c.lineJoin = 'round';

    c.globalAlpha = 1;
    c.globalCompositeOperation = 'source-over';
    if (stroke.tool === 'dotted') {
      c.setLineDash([stroke.baseSize * 2, stroke.baseSize * 3]);
    } else {
      c.setLineDash([]);
    }

    c.strokeStyle = stroke.color;

    for (var i = 1; i < pts.length; i++) {
      var p0 = pts[i - 1];
      var p1 = pts[i];
      c.beginPath();
      c.lineWidth = getStrokeWidth(p1.pressure, stroke.baseSize, stroke.tool, stroke.pressureSens);

      if (i === 1) {
        c.moveTo(p0.x, p0.y);
        c.lineTo(p1.x, p1.y);
      } else {
        var prev = pts[i - 2];
        var mx = (p0.x + p1.x) / 2;
        var my = (p0.y + p1.y) / 2;
        c.moveTo((prev.x + p0.x) / 2, (prev.y + p0.y) / 2);
        c.quadraticCurveTo(p0.x, p0.y, mx, my);
      }
      c.stroke();
    }

    c.globalAlpha = 1;
    c.globalCompositeOperation = 'source-over';
    c.setLineDash([]);
  }

  function renderEraserStroke(c, stroke) {
    if (stroke.points.length < 1) return;
    var pts = stroke.points;
    var r = stroke.baseSize;

    c.globalAlpha = 1;
    c.globalCompositeOperation = 'destination-out';
    c.fillStyle = '#000';

    for (var i = 0; i < pts.length; i++) {
      c.beginPath();
      c.arc(pts[i].x, pts[i].y, r, 0, 6.2832);
      c.fill();

      if (i > 0) {
        var p0 = pts[i - 1];
        var p1 = pts[i];
        var dx = p1.x - p0.x;
        var dy = p1.y - p0.y;
        var dist = Math.sqrt(dx * dx + dy * dy);
        var steps = Math.ceil(dist / (r * 0.5));
        for (var s = 1; s < steps; s++) {
          var t = s / steps;
          c.beginPath();
          c.arc(p0.x + dx * t, p0.y + dy * t, r, 0, 6.2832);
          c.fill();
        }
      }
    }

    c.globalCompositeOperation = 'source-over';
  }

  function drawStrokeIncremental(stroke) {
    var pts = stroke.points;
    if (pts.length < 2) return;

    setWorldTransform();
    setWorldTransform(drawCtx);
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    drawCtx.lineCap = 'round';
    drawCtx.lineJoin = 'round';

    ctx.globalAlpha = 1;
    ctx.globalCompositeOperation = 'source-over';
    drawCtx.globalAlpha = 1;
    drawCtx.globalCompositeOperation = 'source-over';
    if (stroke.tool === 'dotted') {
      ctx.setLineDash([stroke.baseSize * 2, stroke.baseSize * 3]);
      drawCtx.setLineDash([stroke.baseSize * 2, stroke.baseSize * 3]);
    } else {
      ctx.setLineDash([]);
      drawCtx.setLineDash([]);
    }

    ctx.strokeStyle = stroke.color;
    drawCtx.strokeStyle = stroke.color;
    var i = pts.length - 1;
    var p0 = pts[i - 1];
    var p1 = pts[i];
    var lw = getStrokeWidth(p1.pressure, stroke.baseSize, stroke.tool, stroke.pressureSens);
    ctx.lineWidth = lw;
    drawCtx.lineWidth = lw;

    if (i === 1) {
      ctx.beginPath();
      ctx.moveTo(p0.x, p0.y);
      ctx.lineTo(p1.x, p1.y);
      ctx.stroke();
      drawCtx.beginPath();
      drawCtx.moveTo(p0.x, p0.y);
      drawCtx.lineTo(p1.x, p1.y);
      drawCtx.stroke();
    } else {
      var prev = pts[i - 2];
      var mx = (p0.x + p1.x) / 2;
      var my = (p0.y + p1.y) / 2;
      ctx.beginPath();
      ctx.moveTo((prev.x + p0.x) / 2, (prev.y + p0.y) / 2);
      ctx.quadraticCurveTo(p0.x, p0.y, mx, my);
      ctx.stroke();
      drawCtx.beginPath();
      drawCtx.moveTo((prev.x + p0.x) / 2, (prev.y + p0.y) / 2);
      drawCtx.quadraticCurveTo(p0.x, p0.y, mx, my);
      drawCtx.stroke();
    }

    ctx.globalAlpha = 1;
    ctx.globalCompositeOperation = 'source-over';
    ctx.setLineDash([]);
    drawCtx.globalAlpha = 1;
    drawCtx.globalCompositeOperation = 'source-over';
    drawCtx.setLineDash([]);
  }

  function eraseIncremental(stroke, fromIdx) {
    setWorldTransform(drawCtx);
    drawCtx.globalAlpha = 1;
    drawCtx.globalCompositeOperation = 'destination-out';
    drawCtx.fillStyle = '#000';
    var r = stroke.baseSize;
    var pts = stroke.points;

    for (var i = fromIdx; i < pts.length; i++) {
      drawCtx.beginPath();
      drawCtx.arc(pts[i].x, pts[i].y, r, 0, 6.2832);
      drawCtx.fill();

      if (i > 0) {
        var p0 = pts[i - 1];
        var p1 = pts[i];
        var dx = p1.x - p0.x;
        var dy = p1.y - p0.y;
        var dist = Math.sqrt(dx * dx + dy * dy);
        var steps = Math.ceil(dist / (r * 0.5));
        for (var s = 1; s < steps; s++) {
          var t = s / steps;
          drawCtx.beginPath();
          drawCtx.arc(p0.x + dx * t, p0.y + dy * t, r, 0, 6.2832);
          drawCtx.fill();
        }
      }
    }

    drawCtx.globalCompositeOperation = 'source-over';

    // Re-composite to display
    drawBackground();
    setWorldTransform();
    drawGrid();
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.drawImage(drawLayer, 0, 0);
  }

  function getStrokeWidth(pressure, base, tool, sens) {
    var p = Math.max(0.1, pressure);
    var s = (sens !== undefined) ? sens : 0.5;
    var range = s * 1.6;
    return base * ((1 - range / 2) + p * range);
  }

  function screenToWorld(sx, sy) {
    return {
      x: Math.max(0, Math.min(CANVAS_W, sx / view.scale + view.x)),
      y: Math.max(0, Math.min(CANVAS_H, sy / view.scale + view.y))
    };
  }

  // ── Shape Recognition ──

  function resampleEvenly(pts, n) {
    var totalLen = 0;
    for (var i = 1; i < pts.length; i++) {
      var dx = pts[i].x - pts[i-1].x, dy = pts[i].y - pts[i-1].y;
      totalLen += Math.sqrt(dx*dx + dy*dy);
    }
    if (totalLen === 0) return pts.slice(0, n);
    var interval = totalLen / (n - 1);
    var D = 0;
    var src = pts.map(function(p) { return {x:p.x, y:p.y}; });
    var out = [{x: src[0].x, y: src[0].y}];
    for (var i = 1; i < src.length && out.length < n; i++) {
      var dx = src[i].x - src[i-1].x, dy = src[i].y - src[i-1].y;
      var d = Math.sqrt(dx*dx + dy*dy);
      if (D + d >= interval) {
        var t = (interval - D) / d;
        var nx = src[i-1].x + t*dx, ny = src[i-1].y + t*dy;
        out.push({x: nx, y: ny});
        src.splice(i, 0, {x: nx, y: ny});
        D = 0;
      } else {
        D += d;
      }
    }
    while (out.length < n) out.push({x: src[src.length-1].x, y: src[src.length-1].y});
    return out;
  }

  function shapeBounds(pts) {
    var minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
    for (var i = 0; i < pts.length; i++) {
      if (pts[i].x < minX) minX = pts[i].x;
      if (pts[i].y < minY) minY = pts[i].y;
      if (pts[i].x > maxX) maxX = pts[i].x;
      if (pts[i].y > maxY) maxY = pts[i].y;
    }
    return {x: minX, y: minY, w: maxX - minX, h: maxY - minY};
  }

  function ptDist(a, b) {
    var dx = a.x - b.x, dy = a.y - b.y;
    return Math.sqrt(dx*dx + dy*dy);
  }

  function ptToLineDist(p, a, b) {
    var dx = b.x - a.x, dy = b.y - a.y;
    var len2 = dx*dx + dy*dy;
    if (len2 === 0) return ptDist(p, a);
    var t = Math.max(0, Math.min(1, ((p.x-a.x)*dx + (p.y-a.y)*dy) / len2));
    return ptDist(p, {x: a.x+t*dx, y: a.y+t*dy});
  }

  function recognizeShape(rawPoints) {
    if (rawPoints.length < 8) return null;
    var pts = rawPoints.map(function(p) { return {x: p.x, y: p.y}; });
    var resampled = resampleEvenly(pts, 64);
    var bb = shapeBounds(resampled);
    if (bb.w < 15 && bb.h < 15) return null;

    var first = resampled[0], last = resampled[resampled.length - 1];
    var maxDev = 0;
    for (var i = 0; i < resampled.length; i++) {
      maxDev = Math.max(maxDev, ptToLineDist(resampled[i], first, last));
    }
    var span = ptDist(first, last);
    if (span > 20 && maxDev / span < 0.1) {
      return {type: 'line', bounds: bb, p1: {x: first.x, y: first.y}, p2: {x: last.x, y: last.y}};
    }
    return null;
  }

  // ── Shape Rendering ──

  function renderShapeStroke(c, stroke) {
    if (stroke.shapeType !== 'line') return;
    c.strokeStyle = stroke.color;
    c.lineWidth = stroke.baseSize;
    c.lineCap = 'round';
    c.lineJoin = 'round';
    c.globalAlpha = 1;
    c.globalCompositeOperation = 'source-over';
    c.beginPath();
    c.moveTo(stroke.p1.x, stroke.p1.y);
    c.lineTo(stroke.p2.x, stroke.p2.y);
    c.stroke();
  }

  // ── Post-snap drag resize ──

  function resizeSnapDragShape(worldX, worldY) {
    var shape = strokes[snapDragShapeIdx];
    if (!shape || shape.shapeType !== 'line') return;
    shape.p2 = {x: worldX, y: worldY};
    shape.bounds = shapeBounds([shape.p1, shape.p2]);
  }

  // ── Snap Animation ──

  function animateSnap(fromStroke, toShape, callback) {
    snapAnimating = true;
    var startTime = performance.now();
    var duration = 200;

    function frame(time) {
      var progress = Math.min(1, (time - startTime) / duration);
      var eased = 1 - Math.pow(1 - progress, 3);

      drawBackground();
      setWorldTransform();
      drawGrid();
      drawCtx.setTransform(1, 0, 0, 1, 0, 0);
      drawCtx.clearRect(0, 0, drawLayer.width, drawLayer.height);
      setWorldTransform(drawCtx);
      for (var i = 0; i < strokes.length; i++) renderStroke(drawCtx, strokes[i]);

      drawCtx.globalAlpha = 1 - eased;
      renderStroke(drawCtx, fromStroke);
      drawCtx.globalAlpha = eased;
      renderShapeStroke(drawCtx, toShape);
      drawCtx.globalAlpha = 1;

      ctx.setTransform(1, 0, 0, 1, 0, 0);
      ctx.drawImage(drawLayer, 0, 0);

      if (progress < 1) requestAnimationFrame(frame);
      else { snapAnimating = false; callback(); }
    }
    requestAnimationFrame(frame);
  }

  function trySnapShape() {
    if (!isDrawing || !currentStroke || currentStroke.tool === 'eraser' || currentStroke.tool === 'dotted') return;
    if (currentStroke.points.length < 8) return;

    var result = recognizeShape(currentStroke.points);
    if (!result) return;

    var shape = {
      tool: 'shape',
      shapeType: 'line',
      color: currentStroke.color,
      baseSize: currentStroke.baseSize,
      bounds: result.bounds,
      p1: result.p1,
      p2: result.p2
    };

    var freehand = {
      tool: currentStroke.tool,
      color: currentStroke.color,
      baseSize: currentStroke.baseSize,
      points: currentStroke.points.slice()
    };

    isDrawing = false;
    currentStroke = null;
    clearTimeout(holdTimer);
    holdTimer = null;

    animateSnap(freehand, shape, function() {
      strokes.push(shape);
      redoStack = [];
      updateUndoRedo();

      if (penIsDown) {
        snapDragActive = true;
        snapDragShapeIdx = strokes.length - 1;
      } else {
        queueSave();
      }
      redrawAll();
    });
  }

  // ── Selection Tool ──

  function getStrokeBounds(s) {
    if (s.tool === 'shape') return s.bounds || shapeBounds([s.p1, s.p2]);
    if (!s.points || s.points.length === 0) return {x: 0, y: 0, w: 0, h: 0};
    return shapeBounds(s.points);
  }

  function hitTestStroke(worldX, worldY, stroke, threshold) {
    if (stroke.tool === 'eraser') return false;
    if (stroke.tool === 'shape') {
      if (stroke.shapeType === 'line') {
        return ptToLineDist({x: worldX, y: worldY}, stroke.p1, stroke.p2) < threshold;
      }
      return false;
    }
    if (!stroke.points || stroke.points.length < 2) return false;
    for (var i = 1; i < stroke.points.length; i++) {
      if (ptToLineDist({x: worldX, y: worldY}, stroke.points[i-1], stroke.points[i]) < threshold) return true;
    }
    return false;
  }

  function pointInPolygon(x, y, polygon) {
    var inside = false;
    for (var i = 0, j = polygon.length - 1; i < polygon.length; j = i++) {
      var xi = polygon[i].x, yi = polygon[i].y;
      var xj = polygon[j].x, yj = polygon[j].y;
      if ((yi > y) !== (yj > y) && x < (xj - xi) * (y - yi) / (yj - yi) + xi) {
        inside = !inside;
      }
    }
    return inside;
  }

  function getSelectionBounds() {
    var minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
    for (var i = 0; i < selectedIndices.length; i++) {
      var s = strokes[selectedIndices[i]];
      if (!s) continue;
      var b = getStrokeBounds(s);
      if (b.x < minX) minX = b.x;
      if (b.y < minY) minY = b.y;
      if (b.x + b.w > maxX) maxX = b.x + b.w;
      if (b.y + b.h > maxY) maxY = b.y + b.h;
    }
    return {x: minX, y: minY, w: maxX - minX, h: maxY - minY};
  }

  function drawSelectionOverlay() {
    if (selectedIndices.length === 0) return;
    var bounds = getSelectionBounds();
    setWorldTransform();
    var pad = 8 / view.scale;

    ctx.setLineDash([6 / view.scale, 4 / view.scale]);
    ctx.strokeStyle = '#4a9eff';
    ctx.lineWidth = 1.5 / view.scale;
    ctx.strokeRect(bounds.x - pad, bounds.y - pad, bounds.w + pad * 2, bounds.h + pad * 2);
    ctx.setLineDash([]);

    var hs = 7 / view.scale;
    var corners = [
      {x: bounds.x - pad, y: bounds.y - pad},
      {x: bounds.x + bounds.w + pad, y: bounds.y - pad},
      {x: bounds.x + bounds.w + pad, y: bounds.y + bounds.h + pad},
      {x: bounds.x - pad, y: bounds.y + bounds.h + pad}
    ];
    ctx.fillStyle = '#ffffff';
    ctx.strokeStyle = '#4a9eff';
    ctx.lineWidth = 1.5 / view.scale;
    for (var i = 0; i < corners.length; i++) {
      ctx.fillRect(corners[i].x - hs / 2, corners[i].y - hs / 2, hs, hs);
      ctx.strokeRect(corners[i].x - hs / 2, corners[i].y - hs / 2, hs, hs);
    }

    // Lasso path
    if (selectionMode === 'lasso' && lassoPoints.length > 2) {
      ctx.setLineDash([4 / view.scale, 3 / view.scale]);
      ctx.strokeStyle = 'rgba(74, 158, 255, 0.6)';
      ctx.lineWidth = 1 / view.scale;
      ctx.beginPath();
      ctx.moveTo(lassoPoints[0].x, lassoPoints[0].y);
      for (var j = 1; j < lassoPoints.length; j++) {
        ctx.lineTo(lassoPoints[j].x, lassoPoints[j].y);
      }
      ctx.closePath();
      ctx.stroke();
      ctx.setLineDash([]);
    }
  }

  function clearSelection() {
    selectedIndices = [];
    selectionMode = 'idle';
    lassoPoints = [];
    hideSelCtxMenu();
    redrawAll();
  }

  function showSelCtxMenu() {
    if (!selCtxMenu) selCtxMenu = document.getElementById('sel-ctx-menu');
    if (selectedIndices.length === 0) return;
    var bounds = getSelectionBounds();
    var screenX = (bounds.x + bounds.w / 2 - view.x) * view.scale;
    var screenY = (bounds.y - view.y) * view.scale - 50;
    screenX = Math.max(60, Math.min(window.innerWidth - 60, screenX));
    screenY = Math.max(10, screenY);
    selCtxMenu.style.left = (screenX - 60) + 'px';
    selCtxMenu.style.top = screenY + 'px';
    selCtxMenu.classList.add('visible');
  }

  function hideSelCtxMenu() {
    if (!selCtxMenu) selCtxMenu = document.getElementById('sel-ctx-menu');
    selCtxMenu.classList.remove('visible');
  }

  function onSelectDown(e) {
    var pos = screenToWorld(e.clientX, e.clientY);
    var threshold = 15 / view.scale;

    // Check if tapping inside existing selection bounds → start move
    if (selectedIndices.length > 0) {
      var bounds = getSelectionBounds();
      var pad = 8 / view.scale;
      if (pos.x >= bounds.x - pad && pos.x <= bounds.x + bounds.w + pad &&
          pos.y >= bounds.y - pad && pos.y <= bounds.y + bounds.h + pad) {
        selectionMode = 'moving';
        selDragStart = {x: pos.x, y: pos.y};
        selOrigPositions = selectedIndices.map(function(idx) {
          var s = strokes[idx];
          if (s.tool === 'shape') return {p1: {x: s.p1.x, y: s.p1.y}, p2: {x: s.p2.x, y: s.p2.y}};
          return {points: s.points.map(function(p) { return {x: p.x, y: p.y}; })};
        });
        hideSelCtxMenu();
        return;
      }
    }

    // Tap-to-select single stroke
    for (var i = strokes.length - 1; i >= 0; i--) {
      if (hitTestStroke(pos.x, pos.y, strokes[i], threshold)) {
        selectedIndices = [i];
        selectionMode = 'idle';
        redrawAll();
        showSelCtxMenu();
        return;
      }
    }

    // Start lasso
    selectedIndices = [];
    hideSelCtxMenu();
    selectionMode = 'lasso';
    lassoPoints = [{x: pos.x, y: pos.y}];
    redrawAll();
  }

  function onSelectMove(e) {
    var pos = screenToWorld(e.clientX, e.clientY);

    if (selectionMode === 'moving' && selDragStart && selOrigPositions) {
      var dx = pos.x - selDragStart.x;
      var dy = pos.y - selDragStart.y;
      for (var i = 0; i < selectedIndices.length; i++) {
        var s = strokes[selectedIndices[i]];
        var orig = selOrigPositions[i];
        if (s.tool === 'shape') {
          s.p1 = {x: orig.p1.x + dx, y: orig.p1.y + dy};
          s.p2 = {x: orig.p2.x + dx, y: orig.p2.y + dy};
          s.bounds = shapeBounds([s.p1, s.p2]);
        } else if (s.points) {
          for (var j = 0; j < s.points.length; j++) {
            s.points[j].x = orig.points[j].x + dx;
            s.points[j].y = orig.points[j].y + dy;
          }
        }
      }
      redrawAll();
      return;
    }

    if (selectionMode === 'lasso') {
      lassoPoints.push({x: pos.x, y: pos.y});
      redrawAll();
    }
  }

  function onSelectUp(e) {
    if (selectionMode === 'moving') {
      selectionMode = 'idle';
      selDragStart = null;
      selOrigPositions = null;
      queueSave();
      redrawAll();
      showSelCtxMenu();
      return;
    }

    if (selectionMode === 'lasso' && lassoPoints.length > 4) {
      selectedIndices = [];
      for (var i = 0; i < strokes.length; i++) {
        var s = strokes[i];
        if (s.tool === 'eraser') continue;
        var b = getStrokeBounds(s);
        var cx = b.x + b.w / 2;
        var cy = b.y + b.h / 2;
        if (pointInPolygon(cx, cy, lassoPoints)) {
          selectedIndices.push(i);
        }
      }
      lassoPoints = [];
      selectionMode = 'idle';
      redrawAll();
      if (selectedIndices.length > 0) showSelCtxMenu();
      return;
    }

    lassoPoints = [];
    selectionMode = 'idle';
    redrawAll();
  }

  // ── Edge Glow ──

  function updateEdgeGlow(overscrollX, overscrollY) {
    if (!edgeGlowEls) {
      edgeGlowEls = {
        top: document.getElementById('edge-glow-top'),
        bottom: document.getElementById('edge-glow-bottom'),
        left: document.getElementById('edge-glow-left'),
        right: document.getElementById('edge-glow-right')
      };
    }
    var visW = window.innerWidth / view.scale;
    var visH = window.innerHeight / view.scale;
    var deadZone = 30;
    overscrollX = overscrollX || 0;
    overscrollY = overscrollY || 0;

    // Disable glow entirely when fully zoomed out
    var fullyVisible = visW >= CANVAS_W && visH >= CANVAS_H;

    var now = {
      top: !fullyVisible && view.y <= 0 && isPanning && overscrollY < -deadZone,
      bottom: !fullyVisible && view.y + visH >= CANVAS_H && isPanning && overscrollY > deadZone,
      left: !fullyVisible && view.x <= 0 && isPanning && overscrollX < -deadZone,
      right: !fullyVisible && view.x + visW >= CANVAS_W && isPanning && overscrollX > deadZone
    };

    for (var side in now) {
      var el = edgeGlowEls[side];
      if (now[side]) {
        if (!edgeGlowActive[side]) {
          el.style.opacity = '0.7';
          edgeGlowActive[side] = true;
        }
      } else {
        if (edgeGlowActive[side]) {
          el.style.opacity = '0';
          edgeGlowActive[side] = false;
        }
      }
    }
  }

  function pulseEdgeGlow(side) {
    if (!edgeGlowEls) return;
    var el = edgeGlowEls[side];
    el.classList.remove('pulse');
    void el.offsetWidth;
    el.classList.add('pulse');
    setTimeout(function() { el.classList.remove('pulse'); }, 600);
  }

  // ── View clamping ──

  function getMinScale() {
    return Math.max(window.innerWidth / CANVAS_W, window.innerHeight / CANVAS_H);
  }

  function clampView() {
    var ms = getMinScale();
    if (view.scale < ms) view.scale = ms;
    var visW = window.innerWidth / view.scale;
    var visH = window.innerHeight / view.scale;
    view.x = Math.max(0, Math.min(CANVAS_W - visW, view.x));
    view.y = Math.max(0, Math.min(CANVAS_H - visH, view.y));
  }

  // ── Eraser cursor ──

  function updateEraserCursor(sx, sy) {
    if (currentTool !== 'eraser') {
      eraserCursor.style.display = 'none';
      return;
    }
    var screenRadius = eraserSize * view.scale;
    eraserCursor.style.display = 'block';
    eraserCursor.style.left = sx + 'px';
    eraserCursor.style.top = sy + 'px';
    eraserCursor.style.width = (screenRadius * 2) + 'px';
    eraserCursor.style.height = (screenRadius * 2) + 'px';
  }

  function hideEraserCursor() {
    eraserCursor.style.display = 'none';
  }

  // ── Tool switch indicator ──

  function showToolIndicator(x, y) {
    var penPath = '<path d="M12 19l7-7 3 3-7 7-3-3z"/><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/>';
    var eraserPath = '<path d="M20 20H7L3 16c-.8-.8-.8-2 0-2.8L14.2 2c.8-.8 2-.8 2.8 0l5 5c.8.8.8 2 0 2.8L12 20"/><path d="M6 11l7 7"/>';

    toolIndicatorIcon.innerHTML = currentTool === 'eraser' ? eraserPath : penPath;
    toolIndicator.style.left = (x - 28) + 'px';
    toolIndicator.style.top = (y - 28) + 'px';
    toolIndicator.classList.add('visible');

    setTimeout(function() {
      toolIndicator.classList.remove('visible');
    }, 600);
  }

  // ── Floating menu ──

  function toggleMenu(x, y) {
    if (menuVisible) dismissMenu();
    else showMenu(x, y);
  }

  function showMenu(x, y) {
    var mw = 280, mh = 140;
    var mx = (x || lastPenX) - mw / 2;
    var my = (y || lastPenY) - mh - 30;
    mx = Math.max(10, Math.min(window.innerWidth - mw - 10, mx));
    my = Math.max(10, Math.min(window.innerHeight - mh - 10, my));
    floatMenu.style.left = mx + 'px';
    floatMenu.style.top = my + 'px';
    floatMenu.classList.add('visible');
    menuVisible = true;
    syncMenuState();
  }

  function dismissMenu() {
    floatMenu.classList.remove('visible');
    menuVisible = false;
    hideSizePopup();
  }

  function syncMenuState() {
    floatMenu.querySelectorAll('.fm-color').forEach(function(b) {
      b.classList.toggle('active', b.dataset.color === currentColor);
    });
    floatMenu.querySelectorAll('.fm-size').forEach(function(b) {
      b.classList.toggle('active', b.dataset.size === currentSizeKey);
    });
    floatMenu.querySelectorAll('.fm-tool').forEach(function(b) {
      b.classList.toggle('active', b.dataset.tool === currentTool);
    });
    eraserBadge.classList.toggle('visible', currentTool === 'eraser');
    document.getElementById('undo-btn').disabled = strokes.length === 0;
    document.getElementById('redo-btn').disabled = redoStack.length === 0;

    // Update size dot visuals
    var dots = floatMenu.querySelectorAll('.fm-size-dot');
    var keys = ['thin', 'medium', 'thick'];
    dots.forEach(function(dot, idx) {
      var sz = Math.min(14, Math.max(3, sizePresets[keys[idx]] * 1.5));
      dot.style.width = sz + 'px';
      dot.style.height = sz + 'px';
    });
  }

  // ── Size popup (long-press) ──

  function showSizePopup(btn, key) {
    var rect = btn.getBoundingClientRect();
    var isEraser = (key === 'eraser');
    var val = isEraser ? eraserSize : sizePresets[key];

    sizeSlider.min = 0;
    sizeSlider.max = 100;
    sizeSlider.value = sizeToSlider(val, isEraser);
    sizeLabel.textContent = val;
    sizePopupKey = key;

    sizePopup.style.left = (rect.left + rect.width / 2 - 90) + 'px';
    sizePopup.style.top = (rect.bottom + 8) + 'px';
    sizePopup.classList.add('visible');
    sizePopupVisible = true;
  }

  function hideSizePopup() {
    sizePopup.classList.remove('visible');
    sizePopupVisible = false;
    sizePopupKey = null;
  }

  sizeSlider.addEventListener('input', function() {
    var isEraser = (sizePopupKey === 'eraser');
    var val = sliderToSize(parseInt(sizeSlider.value), isEraser);
    sizeLabel.textContent = val;
    if (isEraser) {
      eraserSize = val;
      saveEraserSize();
    } else if (sizePopupKey) {
      sizePresets[sizePopupKey] = val;
      saveSizePresets();
      if (currentSizeKey === sizePopupKey) syncMenuState();
    }
  });

  sizePopup.addEventListener('pointerdown', function(e) { e.stopPropagation(); });
  sizePopup.addEventListener('pointermove', function(e) { e.stopPropagation(); });
  sizePopup.addEventListener('pointerup', function(e) { e.stopPropagation(); });
  sizePopup.addEventListener('touchstart', function(e) { e.stopPropagation(); });
  sizePopup.addEventListener('touchmove', function(e) { e.stopPropagation(); });
  sizePopup.addEventListener('touchend', function(e) { e.stopPropagation(); });

  // ── Undo / Redo ──

  function undo() {
    if (strokes.length === 0) return;
    redoStack.push(strokes.pop());
    if (redoStack.length > 50) redoStack.shift();
    redrawAll();
    updateUndoRedo();
    saveAllStrokesToCloud();
  }

  function redo() {
    if (redoStack.length === 0) return;
    strokes.push(redoStack.pop());
    redrawAll();
    updateUndoRedo();
    saveAllStrokesToCloud();
  }

  function updateUndoRedo() {
    document.getElementById('undo-btn').disabled = strokes.length === 0;
    document.getElementById('redo-btn').disabled = redoStack.length === 0;
  }

  // ── Pointer events (pen only for drawing) ──

  function onPointerDown(e) {
    if (e.pointerType !== 'pen') return;
    if (e.button !== 0) return;
    if (snapAnimating) return;
    e.preventDefault();
    penIsDown = true;

    if (menuVisible) {
      if (!floatMenu.contains(e.target)) dismissMenu();
      if (floatMenu.contains(e.target)) return;
    }

    var pos = screenToWorld(e.clientX, e.clientY);

    if (currentTool === 'select') {
      canvas.setPointerCapture(e.pointerId);
      onSelectDown(e);
      return;
    }

    canvas.setPointerCapture(e.pointerId);
    isDrawing = true;

    if (currentTool === 'eraser') {
      currentStroke = {
        tool: 'eraser',
        baseSize: eraserSize,
        points: [{ x: pos.x, y: pos.y, pressure: e.pressure, timestamp: e.timeStamp }]
      };
      eraseIncremental(currentStroke, 0);
      updateEraserCursor(e.clientX, e.clientY);
      return;
    }

    // Start hold detection
    holdScreenAnchor = {x: e.clientX, y: e.clientY};
    clearTimeout(holdTimer);
    holdTimer = setTimeout(trySnapShape, 500);

    currentStroke = {
      tool: currentTool,
      color: currentColor,
      baseSize: sizePresets[currentSizeKey],
      pressureSens: pressureSensitivity,
      points: [{
        x: pos.x,
        y: pos.y,
        pressure: e.pressure,
        timestamp: e.timeStamp
      }]
    };
  }

  function onPointerMove(e) {
    if (e.pointerType !== 'pen') return;
    if (snapAnimating) return;

    lastPenX = e.clientX;
    lastPenY = e.clientY;

    // Selection tool move
    if (currentTool === 'select') {
      e.preventDefault();
      onSelectMove(e);
      return;
    }

    // Post-snap drag resize
    if (snapDragActive) {
      e.preventDefault();
      var pos = screenToWorld(e.clientX, e.clientY);
      resizeSnapDragShape(pos.x, pos.y);
      redrawAll();
      return;
    }

    if (currentTool === 'eraser' && !isDrawing) {
      updateEraserCursor(e.clientX, e.clientY);
    }

    if (!isDrawing) return;
    e.preventDefault();

    if (currentTool === 'eraser') {
      var events = e.getCoalescedEvents ? e.getCoalescedEvents() : [e];
      var startIdx = currentStroke.points.length;
      for (var k = 0; k < events.length; k++) {
        var ce = events[k];
        var cp = screenToWorld(ce.clientX, ce.clientY);
        currentStroke.points.push({ x: cp.x, y: cp.y, pressure: ce.pressure, timestamp: ce.timeStamp });
      }
      eraseIncremental(currentStroke, startIdx);
      updateEraserCursor(e.clientX, e.clientY);
      return;
    }

    if (!currentStroke) return;

    // Hold detection: reset timer if pen moved > 5px
    if (holdScreenAnchor) {
      var hdx = e.clientX - holdScreenAnchor.x;
      var hdy = e.clientY - holdScreenAnchor.y;
      if (hdx*hdx + hdy*hdy > 25) {
        holdScreenAnchor = {x: e.clientX, y: e.clientY};
        clearTimeout(holdTimer);
        holdTimer = setTimeout(trySnapShape, 500);
      }
    }

    var events2 = e.getCoalescedEvents ? e.getCoalescedEvents() : [e];
    for (var k2 = 0; k2 < events2.length; k2++) {
      var ce2 = events2[k2];
      var cp2 = screenToWorld(ce2.clientX, ce2.clientY);
      currentStroke.points.push({
        x: cp2.x,
        y: cp2.y,
        pressure: ce2.pressure,
        timestamp: ce2.timeStamp
      });
      drawStrokeIncremental(currentStroke);
    }
  }

  function onPointerUp(e) {
    if (e.pointerType !== 'pen') return;
    penIsDown = false;

    if (snapAnimating) return;

    // Finish post-snap drag resize
    if (snapDragActive) {
      e.preventDefault();
      snapDragActive = false;
      snapDragShapeIdx = -1;
      saveAllStrokesToCloud();
      redrawAll();
      return;
    }

    // Selection tool up
    if (currentTool === 'select') {
      onSelectUp(e);
      return;
    }

    if (!isDrawing) return;
    e.preventDefault();
    isDrawing = false;
    clearTimeout(holdTimer);
    holdTimer = null;
    holdScreenAnchor = null;

    if (currentTool === 'eraser') {
      if (currentStroke && currentStroke.points.length >= 2) {
        strokes.push(currentStroke);
        redoStack = [];
        updateUndoRedo();
        queueSave();
      }
      currentStroke = null;
      return;
    }

    if (currentStroke && currentStroke.points.length >= 2) {
      strokes.push(currentStroke);
      redoStack = [];
      updateUndoRedo();
      queueSave();
    }
    currentStroke = null;
  }

  function onPointerCancel(e) {
    if (e.pointerType !== 'pen') return;
    penIsDown = false;
    isDrawing = false;
    currentStroke = null;
    clearTimeout(holdTimer);
    holdTimer = null;
    holdScreenAnchor = null;
    snapDragActive = false;
    snapDragShapeIdx = -1;
    hideEraserCursor();
  }

  function onPointerLeave(e) {
    if (e.pointerType === 'pen') hideEraserCursor();
  }

  // ── Touch: one finger = pan + double-tap, two finger = pinch + tap-for-menu ──

  function hasStylusTouch(e) {
    for (var i = 0; i < e.touches.length; i++) {
      if (e.touches[i].touchType === 'stylus') return true;
    }
    return false;
  }

  function cancelMomentum() {
    if (momentumAnimId) {
      cancelAnimationFrame(momentumAnimId);
      momentumAnimId = null;
    }
    momentumVel = {x: 0, y: 0};
    panHistory = [];
  }

  function startMomentum() {
    var now = performance.now();
    // Compute velocity from recent pan history (last ~100ms)
    var vx = 0, vy = 0, count = 0;
    for (var i = panHistory.length - 1; i >= 1; i--) {
      var dt = panHistory[i].t - panHistory[i-1].t;
      if (now - panHistory[i].t > 100) break;
      if (dt > 0) {
        vx += (panHistory[i].x - panHistory[i-1].x) / dt;
        vy += (panHistory[i].y - panHistory[i-1].y) / dt;
        count++;
      }
    }
    if (count > 0) { vx /= count; vy /= count; }
    var speed = Math.sqrt(vx*vx + vy*vy);
    if (speed < 0.3) { panHistory = []; return; }

    momentumVel = {x: vx, y: vy};
    var friction = 0.95;
    var lastFrame = performance.now();

    function momentumFrame() {
      var now = performance.now();
      var dt = now - lastFrame;
      lastFrame = now;
      if (dt > 50) dt = 50;

      view.x -= momentumVel.x * dt / view.scale;
      view.y -= momentumVel.y * dt / view.scale;

      var preClampX = view.x, preClampY = view.y;
      clampView();
      var hitEdge = (view.x !== preClampX || view.y !== preClampY);

      momentumVel.x *= friction;
      momentumVel.y *= friction;

      var curSpeed = Math.sqrt(momentumVel.x*momentumVel.x + momentumVel.y*momentumVel.y);

      if (hitEdge) {
        isPanning = true;
        var osX = (preClampX - view.x) * view.scale;
        var osY = (preClampY - view.y) * view.scale;
        updateEdgeGlow(osX, osY);
        if (Math.abs(osX) > 30 || Math.abs(osY) > 30) {
          if (osX < -30) pulseEdgeGlow('left');
          if (osX > 30) pulseEdgeGlow('right');
          if (osY < -30) pulseEdgeGlow('top');
          if (osY > 30) pulseEdgeGlow('bottom');
        }
        momentumVel = {x: 0, y: 0};
      }

      redrawAll();

      if (curSpeed < 0.05 || hitEdge) {
        momentumAnimId = null;
        isPanning = false;
        updateEdgeGlow(0, 0);
        return;
      }
      momentumAnimId = requestAnimationFrame(momentumFrame);
    }
    momentumAnimId = requestAnimationFrame(momentumFrame);
  }

  function onTouchStart(e) {
    e.preventDefault();
    if (hasStylusTouch(e)) return;
    cancelMomentum();

    if (e.touches.length === 1 && !pinchState) {
      var t = e.touches[0];
      dragState = {
        startX: t.clientX,
        startY: t.clientY,
        viewX: view.x,
        viewY: view.y,
        moved: false,
        time: performance.now()
      };
    }

    if (e.touches.length === 2) {
      dragState = null;
      var t1 = e.touches[0], t2 = e.touches[1];
      var cx = (t1.clientX + t2.clientX) / 2;
      var cy = (t1.clientY + t2.clientY) / 2;

      twoFingerStart = {
        time: performance.now(),
        x1: t1.clientX, y1: t1.clientY,
        x2: t2.clientX, y2: t2.clientY,
        moved: false
      };

      pinchState = {
        startDist: Math.hypot(t2.clientX - t1.clientX, t2.clientY - t1.clientY),
        startScale: view.scale,
        worldCX: cx / view.scale + view.x,
        worldCY: cy / view.scale + view.y
      };
    }
  }

  function onTouchMove(e) {
    e.preventDefault();
    if (hasStylusTouch(e)) return;

    if (e.touches.length === 1 && dragState && !pinchState) {
      var t = e.touches[0];
      var dx = t.clientX - dragState.startX;
      var dy = t.clientY - dragState.startY;
      if (Math.abs(dx) > 8 || Math.abs(dy) > 8) dragState.moved = true;

      // Track pan velocity
      panHistory.push({x: t.clientX, y: t.clientY, t: performance.now()});
      if (panHistory.length > 10) panHistory.shift();

      var desiredX = dragState.viewX - dx / view.scale;
      var desiredY = dragState.viewY - dy / view.scale;
      view.x = desiredX;
      view.y = desiredY;
      clampView();
      isPanning = true;

      // Overscroll = how far past edge the user is trying to go (in screen px)
      var overscrollX = (desiredX - view.x) * view.scale;
      var overscrollY = (desiredY - view.y) * view.scale;
      updateEdgeGlow(overscrollX, overscrollY);
      redrawAll();
    }

    if (e.touches.length === 2 && pinchState) {
      var t1 = e.touches[0], t2 = e.touches[1];

      if (twoFingerStart) {
        var d1 = Math.hypot(t1.clientX - twoFingerStart.x1, t1.clientY - twoFingerStart.y1);
        var d2 = Math.hypot(t2.clientX - twoFingerStart.x2, t2.clientY - twoFingerStart.y2);
        if (d1 > 12 || d2 > 12) twoFingerStart.moved = true;
      }

      var dist = Math.hypot(t2.clientX - t1.clientX, t2.clientY - t1.clientY);
      var cx = (t1.clientX + t2.clientX) / 2;
      var cy = (t1.clientY + t2.clientY) / 2;

      var newScale = Math.max(getMinScale(), Math.min(4, pinchState.startScale * (dist / pinchState.startDist)));

      view.scale = newScale;
      var desiredX2 = pinchState.worldCX - cx / newScale;
      var desiredY2 = pinchState.worldCY - cy / newScale;
      view.x = desiredX2;
      view.y = desiredY2;
      clampView();
      isPanning = true;
      var osX2 = (desiredX2 - view.x) * view.scale;
      var osY2 = (desiredY2 - view.y) * view.scale;
      updateEdgeGlow(osX2, osY2);
      redrawAll();
    }
  }

  function onTouchEnd(e) {
    if (hasStylusTouch(e)) return;

    if (e.touches.length < 2) {
      if (twoFingerStart && !twoFingerStart.moved) {
        var elapsed = performance.now() - twoFingerStart.time;
        if (elapsed < 350) {
          var cx = (twoFingerStart.x1 + twoFingerStart.x2) / 2;
          var cy = (twoFingerStart.y1 + twoFingerStart.y2) / 2;
          toggleMenu(cx, cy);
        }
      }
      twoFingerStart = null;
      pinchState = null;

      if (e.touches.length === 1) {
        var t = e.touches[0];
        dragState = {
          startX: t.clientX,
          startY: t.clientY,
          viewX: view.x,
          viewY: view.y,
          moved: false,
          time: performance.now()
        };
      }
    }

    if (e.touches.length === 0) {
      // Start momentum scrolling if there was a swipe
      if (dragState && dragState.moved) {
        startMomentum();
      } else {
        isPanning = false;
        updateEdgeGlow(0, 0);
      }

      // Double-tap detection
      if (dragState && !dragState.moved) {
        var tapDuration = performance.now() - dragState.time;
        if (tapDuration < 250) {
          var now = performance.now();
          var tapDist = Math.hypot(dragState.startX - lastTap.x, dragState.startY - lastTap.y);
          if (now - lastTap.time < 350 && tapDist < 40) {
            currentTool = (currentTool === 'eraser') ? 'pen' : 'eraser';
            showToolIndicator(dragState.startX, dragState.startY);
            syncMenuState();
            lastTap = { time: 0, x: 0, y: 0 };
          } else {
            lastTap = { time: now, x: dragState.startX, y: dragState.startY };
          }
        }
      }
      dragState = null;
    }
  }

  // ── Menu interactions ──

  floatMenu.querySelectorAll('.fm-color').forEach(function(btn) {
    btn.addEventListener('pointerdown', function(e) {
      e.stopPropagation();
      currentColor = btn.dataset.color;
      if (currentTool === 'eraser') currentTool = 'pen';
      syncMenuState();
    });
  });

  document.getElementById('custom-color').addEventListener('change', function(e) {
    e.stopPropagation();
    var color = e.target.value;
    currentColor = color;
    if (currentTool === 'eraser') currentTool = 'pen';
    // Add as custom swatch if not already present
    if (customColors.indexOf(color) === -1) {
      customColors.push(color);
      if (customColors.length > 12) customColors.shift();
      saveCustomColors();
      rebuildCustomSwatches();
    }
    floatMenu.querySelectorAll('.fm-color').forEach(function(b) { b.classList.remove('active'); });
    syncMenuState();
  });

  document.getElementById('custom-color').addEventListener('input', function(e) {
    e.stopPropagation();
    currentColor = e.target.value;
    if (currentTool === 'eraser') currentTool = 'pen';
    floatMenu.querySelectorAll('.fm-color').forEach(function(b) { b.classList.remove('active'); });
  });

  function rebuildCustomSwatches() {
    var row = document.getElementById('color-row');
    row.querySelectorAll('.fm-color-custom').forEach(function(el) { el.remove(); });
    var wrap = row.querySelector('.fm-custom-wrap');
    for (var i = 0; i < customColors.length; i++) {
      var btn = document.createElement('button');
      btn.className = 'fm-color fm-color-custom';
      btn.dataset.color = customColors[i];
      btn.style.background = customColors[i];
      btn.addEventListener('pointerdown', (function(color) {
        return function(ev) {
          ev.stopPropagation();
          currentColor = color;
          if (currentTool === 'eraser') currentTool = 'pen';
          syncMenuState();
        };
      })(customColors[i]));
      row.insertBefore(btn, wrap);
    }
  }

  // Size buttons: tap = select, long-press = adjust
  floatMenu.querySelectorAll('.fm-size').forEach(function(btn) {
    var pressTimer = null;
    var didLongPress = false;

    btn.addEventListener('pointerdown', function(e) {
      e.stopPropagation();
      didLongPress = false;
      pressTimer = setTimeout(function() {
        didLongPress = true;
        showSizePopup(btn, btn.dataset.size);
      }, 400);
    });

    btn.addEventListener('pointerup', function(e) {
      e.stopPropagation();
      clearTimeout(pressTimer);
      if (!didLongPress) {
        currentSizeKey = btn.dataset.size;
        if (currentTool === 'eraser') currentTool = 'pen';
        hideSizePopup();
        syncMenuState();
      }
    });

    btn.addEventListener('pointerleave', function() {
      clearTimeout(pressTimer);
    });

    btn.addEventListener('pointercancel', function() {
      clearTimeout(pressTimer);
    });
  });

  // Eraser tool: tap = select, long-press = adjust size
  var eraserBtn = floatMenu.querySelector('[data-tool="eraser"]');
  (function() {
    var pressTimer = null;
    var didLongPress = false;

    eraserBtn.addEventListener('pointerdown', function(e) {
      e.stopPropagation();
      didLongPress = false;
      pressTimer = setTimeout(function() {
        didLongPress = true;
        showSizePopup(eraserBtn, 'eraser');
      }, 400);
    });

    eraserBtn.addEventListener('pointerup', function(e) {
      e.stopPropagation();
      clearTimeout(pressTimer);
      if (!didLongPress) {
        currentTool = 'eraser';
        hideSizePopup();
        syncMenuState();
      }
    });

    eraserBtn.addEventListener('pointerleave', function() {
      clearTimeout(pressTimer);
    });

    eraserBtn.addEventListener('pointercancel', function() {
      clearTimeout(pressTimer);
    });
  })();

  // Other tools (pen, dotted, select) — simple tap
  floatMenu.querySelectorAll('.fm-tool:not([data-tool="eraser"])').forEach(function(btn) {
    btn.addEventListener('pointerdown', function(e) {
      e.stopPropagation();
      var newTool = btn.dataset.tool;
      if (currentTool === 'select' && newTool !== 'select') clearSelection();
      currentTool = newTool;
      hideSizePopup();
      syncMenuState();
    });
  });

  document.getElementById('undo-btn').addEventListener('pointerdown', function(e) {
    e.stopPropagation();
    undo();
    syncMenuState();
  });

  document.getElementById('redo-btn').addEventListener('pointerdown', function(e) {
    e.stopPropagation();
    redo();
    syncMenuState();
  });

  document.getElementById('clear-btn').addEventListener('pointerdown', function(e) {
    e.stopPropagation();
    if (strokes.length === 0) return;
    dismissMenu();
    dialog.classList.add('visible');
  });

  document.getElementById('cancel-clear').addEventListener('pointerdown', function() {
    dialog.classList.remove('visible');
  });

  document.getElementById('confirm-clear').addEventListener('pointerdown', function() {
    strokes = [];
    redoStack = [];
    redrawAll();
    updateUndoRedo();
    dialog.classList.remove('visible');
    canvasRef.remove();
    localStorage.removeItem(localBufferKey);
  });

  floatMenu.addEventListener('pointerdown', function(e) { e.stopPropagation(); });
  floatMenu.addEventListener('pointermove', function(e) { e.stopPropagation(); });
  floatMenu.addEventListener('pointerup', function(e) { e.stopPropagation(); });

  // ── Event binding ──

  canvas.addEventListener('pointerdown', onPointerDown, { passive: false });
  canvas.addEventListener('pointermove', onPointerMove, { passive: false });
  canvas.addEventListener('pointerup', onPointerUp, { passive: false });
  canvas.addEventListener('pointercancel', onPointerCancel);
  canvas.addEventListener('pointerleave', onPointerLeave);

  canvas.addEventListener('touchstart', onTouchStart, { passive: false });
  canvas.addEventListener('touchmove', onTouchMove, { passive: false });
  canvas.addEventListener('touchend', onTouchEnd, { passive: false });

  canvas.addEventListener('gesturestart', function(e) { e.preventDefault(); });
  canvas.addEventListener('gesturechange', function(e) { e.preventDefault(); });
  canvas.addEventListener('gestureend', function(e) { e.preventDefault(); });

  // Keyboard shortcuts
  document.addEventListener('keydown', function(e) {
    if ((e.metaKey || e.ctrlKey) && e.key === 'z') {
      e.preventDefault();
      if (e.shiftKey) redo();
      else undo();
    }
    if (e.key === ' ' && !e.repeat) {
      e.preventDefault();
      toggleMenu(lastPenX || window.innerWidth / 2, lastPenY || window.innerHeight / 2);
    }
  });

  // Dismiss size popup on outside tap
  document.addEventListener('pointerdown', function(e) {
    if (sizePopupVisible && !sizePopup.contains(e.target) && !floatMenu.contains(e.target)) {
      hideSizePopup();
    }
  });

  // ── Init ──

  function centerView() {
    view.scale = getMinScale();
    var visW = window.innerWidth / view.scale;
    var visH = window.innerHeight / view.scale;
    view.x = (CANVAS_W - visW) / 2;
    view.y = (CANVAS_H - visH) / 2;
    clampView();
  }

  centerView();
  resizeCanvas();

  // Load strokes from cloud on startup
  loadFromCloud(function() {
    redrawAll();
    updateUndoRedo();
    flushOfflineBuffer();
    metaRef.once('value', function(snap) {
      ensureCurrentPageRegistered(snap.val() || {});
    });
  });

  window.addEventListener('resize', function() {
    resizeCanvas();
  });

  // ── Refresh button ──
  document.getElementById('refresh-btn').addEventListener('click', function(e) {
    e.preventDefault();
    if (batchPending.length > 0) flushBatch();
    window.location.reload();
  });

  // ── Pressure slider ──
  var pressureSlider = document.getElementById('pressure-slider');
  pressureSlider.value = Math.round(pressureSensitivity * 100);
  pressureSlider.addEventListener('input', function(e) {
    e.stopPropagation();
    pressureSensitivity = parseInt(pressureSlider.value) / 100;
    savePressureSensitivity();
  });
  pressureSlider.addEventListener('pointerdown', function(e) { e.stopPropagation(); });
  pressureSlider.addEventListener('pointermove', function(e) { e.stopPropagation(); });
  pressureSlider.addEventListener('pointerup', function(e) { e.stopPropagation(); });
  pressureSlider.addEventListener('touchstart', function(e) { e.stopPropagation(); });
  pressureSlider.addEventListener('touchmove', function(e) { e.stopPropagation(); });
  pressureSlider.addEventListener('touchend', function(e) { e.stopPropagation(); });

  // ── Selection context menu handlers ──
  document.getElementById('sel-copy-btn').addEventListener('pointerdown', function(e) {
    e.stopPropagation();
    if (selectedIndices.length === 0) return;
    var copies = [];
    var bounds = getSelectionBounds();
    var offset = 20;
    for (var i = 0; i < selectedIndices.length; i++) {
      var s = strokes[selectedIndices[i]];
      var copy = JSON.parse(JSON.stringify(s));
      if (copy.tool === 'shape') {
        copy.p1.x += offset; copy.p1.y += offset;
        copy.p2.x += offset; copy.p2.y += offset;
        copy.bounds = shapeBounds([copy.p1, copy.p2]);
      } else if (copy.points) {
        for (var j = 0; j < copy.points.length; j++) {
          copy.points[j].x += offset;
          copy.points[j].y += offset;
        }
      }
      copies.push(copy);
    }
    var newIndices = [];
    for (var k = 0; k < copies.length; k++) {
      strokes.push(copies[k]);
      newIndices.push(strokes.length - 1);
    }
    selectedIndices = newIndices;
    redoStack = [];
    updateUndoRedo();
    queueSave();
    redrawAll();
    showSelCtxMenu();
  });

  document.getElementById('sel-delete-btn').addEventListener('pointerdown', function(e) {
    e.stopPropagation();
    if (selectedIndices.length === 0) return;
    selectedIndices.sort(function(a, b) { return b - a; });
    for (var i = 0; i < selectedIndices.length; i++) {
      strokes.splice(selectedIndices[i], 1);
    }
    selectedIndices = [];
    redoStack = [];
    updateUndoRedo();
    hideSelCtxMenu();
    queueSave();
    redrawAll();
  });

  // Build custom color swatches on init
  rebuildCustomSwatches();
})();
</script>
</body>
</html>
